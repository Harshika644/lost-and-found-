<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lost & Found Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f1f3f5;
      font-family: 'Segoe UI', sans-serif;
    }

    .hero-box {
      background: #ffffff;
      padding: 60px 30px;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
      max-width: 700px;
      width: 100%;
    }

    .hero-title {
      font-weight: 700;
      font-size: 2.5rem;
    }

    .hero-subtitle {
      font-size: 1.2rem;
      color: #6c757d;
      margin-bottom: 30px;
    }

    .btn-lg {
      width: 260px;
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="hero-box text-center">

    <h1 class="hero-title text-primary">🔍 Lost & Found Portal</h1>

    <p class="hero-subtitle">
      Helping reunite people with their loved ones
    </p>

    {% if session.get('user') %}

    <!-- ✅ After login -->
    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
      <a href="/lost" class="btn btn-danger btn-lg">
        📤 Report Missing Person
      </a>

      <a href="/found" class="btn btn-success btn-lg">
        ✅ View Missing People
      </a>
    </div>

    <br>
    <a href="/logout" class="btn btn-outline-dark">Logout</a>

    {% else %}

    <!-- 🔐 Before login -->
    <p class="text-muted mb-4">Please login to continue</p>

    <a href="/login" class="btn btn-primary btn-lg">
      🔐 Login
    </a>

    <br><br>

    <a href="/register" class="text-decoration-none">
      New user? Register here
    </a>

    {% endif %}

  </div>
</div>

</body>
</html>
